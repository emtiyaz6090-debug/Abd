<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Para Ti 🌻</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFF3DC;
            --magenta: #FF4DA6;
            --deep-pink: #CC0066;
            --sunflower: #FFD700;
            --trunk: #5D4037;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: #121212;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Mobile Frame 9:16 */
        .mobile-container {
            width: 100vw;
            height: 100vh;
            max-width: 430px; /* iPhone 15 Pro Max width approx */
            max-height: 932px;
            background: var(--cream);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 8px solid #222;
            border-radius: 40px;
        }

        /* WhatsApp Scene */
        #chat-scene {
            position: absolute;
            inset: 0;
            background: #e5ddd5;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }

        .chat-header { background: #075e54; color: white; padding: 40px 20px 15px; }
        .message-bubble {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 20px;
            width: fit-content;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* Canvas Scene */
        #main-canvas {
            position: absolute;
            inset: 0;
            background: var(--cream);
            display: none;
            opacity: 0;
        }

        .particle {
            position: absolute;
            color: rgba(255, 77, 166, 0.3);
            pointer-events: none;
        }

        /* Code Editor Overlay */
        #code-editor {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 120px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            padding: 15px;
            color: #00ff00;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        /* Tree & Flowers */
        #tree-svg {
            width: 100%;
            height: 100%;
        }

        .sunflower {
            transform-origin: center;
            scale: 0;
        }

        .typing-text {
            position: absolute;
            top: 20%;
            width: 80%;
            left: 10%;
            text-align: center;
            color: var(--deep-pink);
            font-weight: 600;
            line-height: 1.4;
            z-index: 80;
        }

        .countdown {
            position: absolute;
            bottom: 160px;
            width: 100%;
            text-align: center;
            font-weight: 300;
            color: #5D4037;
            font-size: 0.85rem;
        }

        .cursor {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div id="chat-scene">
            <div class="chat-header">
                <p class="font-bold">My Love ❤️</p>
                <p class="text-xs opacity-80">online</p>
            </div>
            <div class="message-bubble" id="file-link">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📄</span>
                    <div>
                        <p class="text-sm font-semibold">Flores para ti 🌻❤️.html</p>
                        <p class="text-[10px] text-gray-500">HTML • 42 KB</p>
                    </div>
                </div>
            </div>
            <div class="cursor" id="fake-cursor"></div>
        </div>

        <div id="main-canvas">
            <div id="particles-container"></div>

            <div class="typing-text" id="love-message"></div>

            <svg id="tree-svg" viewBox="0 0 400 600">
                <path id="trunk" d="M200,550 Q200,450 200,350" fill="none" stroke="#5D4037" stroke-width="8" stroke-linecap="round" />
                <g id="flowers-group"></g>
            </svg>

            <div class="countdown" id="timer">
                Counting every second with you...<br>
                <span id="time-display" class="font-bold">00:00:00:00</span>
            </div>

            <div id="code-editor">
                <div id="code-content"></div>
            </div>

            <footer class="absolute bottom-6 w-full text-center text-[10px] text-gray-400">
                Made with ❤️ by Emti Yaz
            </footer>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        gsap.registerPlugin(TextPlugin);

        const fileLink = document.getElementById('file-link');
        const fakeCursor = document.getElementById('fake-cursor');
        const chatScene = document.getElementById('chat-scene');
        const mainCanvas = document.getElementById('main-canvas');
        const codeEditor = document.getElementById('code-editor');
        const codeContent = document.getElementById('code-content');
        const music = document.getElementById('bg-music');

        // Initial State
        gsap.set(fakeCursor, { x: 300, y: 500 });

        // --- SCENE 1: THE CLICK ---
        const tlStart = gsap.timeline({ delay: 1 });

        tlStart.to(fakeCursor, { 
            x: 100, y: 120, duration: 1.5, ease: "power2.inOut" 
        })
        .to(fileLink, { scale: 0.95, duration: 0.1 })
        .to(fileLink, { scale: 1, duration: 0.1 })
        .add(() => {
            startExperience();
        });

        function startExperience() {
            music.play();
            gsap.to(chatScene, { opacity: 0, duration: 0.5, onComplete: () => chatScene.style.display = 'none' });
            gsap.to(mainCanvas, { display: 'block', opacity: 1, duration: 1 });
            
            initParticles();
            startTreeAnimation();
            startCodeTyping();
        }

        // --- SCENE 2: TREE GROWTH ---
        function startTreeAnimation() {
            const trunk = document.getElementById('trunk');
            const length = trunk.getTotalLength();
            
            gsap.set(trunk, { strokeDasharray: length, strokeDashoffset: length });
            
            gsap.to(trunk, { 
                strokeDashoffset: 0, 
                duration: 2, 
                ease: "power1.inOut",
                onComplete: bloomFlowers
            });
        }

        function bloomFlowers() {
            const group = document.getElementById('flowers-group');
            // Heart shape coordinates (approximate)
            const points = [];
            for (let t = 0; t <= Math.PI * 2; t += 0.2) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                points.push({ x: x * 10 + 200, y: y * 10 + 250 });
            }

            points.forEach((p, i) => {
                const flower = document.createElementNS("http://www.w3.org/2000/svg", "g");
                flower.setAttribute("transform", `translate(${p.x}, ${p.y})`);
                flower.innerHTML = `
                    <circle r="8" fill="#FFD700" />
                    <circle r="3" fill="#5D4037" />
                `;
                flower.classList.add('sunflower');
                group.appendChild(flower);

                gsap.to(flower, {
                    scale: 1,
                    duration: 1,
                    delay: i * 0.05,
                    ease: "back.out(1.7)"
                });
            });

            // Start Message Typing after blooming starts
            setTimeout(typeLoveMessage, 1000);
        }

        // --- SCENE 3: MESSAGE & TIMER ---
        function typeLoveMessage() {
            gsap.to("#love-message", {
                duration: 10,
                text: {
                    value: "My love for you started... 💖<br>Yellow flowers for the love of my life 🌻<br>If I could choose a safe place, it would be by your side.<br>The more time I spend with you, the more I love you.<br>— I Love You! —",
                    delimiter: ""
                },
                ease: "none"
            });
            startTimer();
        }

        // --- CODE EDITOR EMULATION ---
        function startCodeTyping() {
            codeEditor.style.display = 'block';
            const cssLines = [
                ".Flores_Amarilla {",
                "  display: flex;",
                "  animation: bloom 2s;",
                "  color: #FFD700;",
                "}",
                ".Heart_Shape {",
                "  position: absolute;",
                "  font-family: 'Te Amo';",
                "  transform: scale(1.1);",
                "}"
            ];

            let lineIdx = 0;
            const interval = setInterval(() => {
                if (lineIdx < cssLines.length) {
                    const line = document.createElement('div');
                    line.textContent = cssLines[lineIdx];
                    codeContent.appendChild(line);
                    codeEditor.scrollTop = codeEditor.scrollHeight;
                    lineIdx++;
                } else {
                    lineIdx = 0; // Loop or stay
                }
            }, 800);
        }

        // --- PARTICLES ---
        function initParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = '❤';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.fontSize = (Math.random() * 10 + 10) + 'px';
                container.appendChild(p);

                gsap.to(p, {
                    y: -100,
                    opacity: 0,
                    duration: 3 + Math.random() * 2,
                    repeat: -1,
                    delay: Math.random() * 5,
                    ease: "none"
                });
            }
        }

        // --- COUNTDOWN LOGIC ---
        function startTimer() {
            const startDate = new Date("2023-09-21T00:00:00"); // Change to your start date

            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                const secs = Math.floor((diff / 1000) % 60);

                document.getElementById('time-display').textContent = 
                    `${days}d ${hours}h ${mins}m ${secs}s`;
            }, 1000);
        }
    </script>
</body>
      </html>
