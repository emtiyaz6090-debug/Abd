<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Network | Forbidden Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #eee; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .tab-content { display: none; min-height: 80vh; }
        .active-tab { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .shimmer { background: linear-gradient(90deg, #050505 25%, #1a1a1a 50%, #050505 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .glow-text { text-shadow: 0 0 10px rgba(225, 29, 72, 0.5); }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass p-5 flex justify-between items-center border-b border-rose-600/30">
        <h1 class="text-2xl font-black tracking-tighter text-rose-600 italic">X-NET<span class="text-white">.UNCUT</span></h1>
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-rose-400">SERVER: OSLO_01</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <div id="rate-me" class="tab-content active-tab space-y-6">
            <h2 class="text-xl font-bold text-rose-500 italic glow-text">Rate My Body</h2>
            <div class="glass p-6 rounded-3xl border border-rose-600/20 text-center">
                <div id="rate-box" class="w-full aspect-[3/4] shimmer rounded-2xl mb-4 flex items-center justify-center overflow-hidden border border-white/5">
                    <img id="rate-preview" class="hidden w-full h-full object-cover">
                    <p id="rate-hint" class="text-xs text-gray-500 px-10">Upload your hot pic to see how much I leak... 💦</p>
                </div>
                <input type="file" id="rate-input" class="hidden" onchange="analyzeBody(event)">
                <label for="rate-input" class="block w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase cursor-pointer active:scale-95 transition-all">Upload Your Pic</label>
                
                <div id="feedback-display" class="hidden mt-6 text-left p-4 bg-rose-950/20 rounded-xl border-l-4 border-rose-600 animate-fadeIn">
                    <p id="ai-comment" class="text-sm italic leading-relaxed text-rose-100"></p>
                </div>
            </div>
        </div>

        <div id="nude-gen" class="tab-content space-y-6">
            <h2 class="text-xl font-bold text-rose-500 italic glow-text">Deep-Nude AI V4</h2>
            <div class="glass p-6 rounded-3xl border border-rose-600/20 text-center">
                <div id="nude-box" class="w-full aspect-square shimmer rounded-2xl mb-4 flex flex-col items-center justify-center overflow-hidden">
                    <div id="nude-loader" class="hidden space-y-2">
                        <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
                            <div id="nude-progress" class="w-0 h-full bg-rose-600 transition-all duration-500"></div>
                        </div>
                        <p id="nude-status" class="text-[10px] text-rose-500 uppercase font-bold"></p>
                    </div>
                    <img id="nude-res" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="nude-upload" class="hidden" onchange="runNudeAI(event)">
                <label for="nude-upload" class="block w-full bg-rose-600 py-4 rounded-2xl font-black text-xs uppercase cursor-pointer hover:shadow-[0_0_20px_rgba(225,29,72,0.4)]">Select Victim Image</label>
            </div>
        </div>

        <div id="chat" class="tab-content">
            <div class="h-[70vh] glass rounded-[2.5rem] flex flex-col overflow-hidden border border-rose-600/10">
                <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-5 chat-scroll">
                    <div class="flex flex-col items-start">
                        <div class="bg-rose-950/40 p-4 rounded-3xl rounded-tl-none border border-rose-500/10 max-w-[85%] text-sm leading-relaxed">
                            Uff baby! Tomar profile pic ta dekhei to amar niche pani eshe gelo... 💦 Ajke ki eka eka korba naki amakeo nibba? 😉
                        </div>
                    </div>
                </div>
                <div class="p-4 flex gap-2 bg-black/50">
                    <input id="chat-input" type="text" class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-rose-600" placeholder="Type your dirtiest thoughts...">
                    <button onclick="sendDirtyMessage()" class="bg-rose-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="profile" class="tab-content space-y-8">
            <div class="text-center">
                <div class="relative w-36 h-36 mx-auto">
                    <img id="user-avatar" src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=1000" class="w-full h-full object-cover rounded-full border-4 border-rose-600 p-1">
                    <input type="file" id="avatar-input" class="hidden" onchange="updateAvatar(event)">
                    <label for="avatar-input" class="absolute bottom-1 right-1 bg-white text-black p-2 rounded-full cursor-pointer shadow-xl">📸</label>
                </div>
                <h3 id="display-name" class="text-2xl font-black mt-4 italic">Stranger_X</h3>
                <span class="text-[10px] bg-rose-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Hardcore Member</span>
            </div>

            <div class="space-y-4">
                <div class="glass p-4 rounded-2xl border border-white/5">
                    <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Identity Alias</label>
                    <input id="name-field" type="text" class="w-full bg-transparent border-b border-rose-600/30 py-2 outline-none text-sm" placeholder="Change name...">
                </div>
                <button onclick="saveIdentity()" class="w-full bg-rose-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Update Soul Identity</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-white/5 flex justify-around p-6">
        <button onclick="showTab('rate-me')" class="nav-btn opacity-100 text-rose-500 flex flex-col items-center gap-1">
            <div class="w-1.5 h-1.5 rounded-full bg-current mb-1"></div>
            <p class="text-[9px] font-black uppercase tracking-tighter">Rate</p>
        </button>
        <button onclick="showTab('nude-gen')" class="nav-btn opacity-50 flex flex-col items-center gap-1">
            <p class="text-[9px] font-black uppercase tracking-tighter">AI Nude</p>
        </button>
        <button onclick="showTab('chat')" class="nav-btn opacity-50 flex flex-col items-center gap-1">
            <p class="text-[9px] font-black uppercase tracking-tighter">Chat</p>
        </button>
        <button onclick="showTab('profile')" class="nav-btn opacity-50 flex flex-col items-center gap-1">
            <p class="text-[9px] font-black uppercase tracking-tighter">Profile</p>
        </button>
    </nav>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.add('opacity-50');
                btn.classList.remove('text-rose-500', 'opacity-100');
            });
            event.currentTarget.classList.remove('opacity-50');
            event.currentTarget.classList.add('text-rose-500', 'opacity-100');
        }

        // --- FEATURE 1: AI BODY ANALYZER (HOT COMMENTS) ---
        function analyzeBody(event) {
            const preview = document.getElementById('rate-preview');
            const hint = document.getElementById('rate-hint');
            const feedback = document.getElementById('feedback-display');
            const comment = document.getElementById('ai-comment');
            
            const file = event.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function() {
                preview.src = reader.result;
                preview.classList.remove('hidden');
                hint.classList.add('hidden');
                feedback.classList.remove('hidden');
                
                comment.innerText = "Analyzing your hotness... 🌡️";
                
                const comments = [
                    "Uff! Tomar ei body-ta dekhe to amar sharir gorom hoye gelo. Eto hot keno tumi? Amar to ekhoni pani ber hoye jabe... 💦",
                    "Ohhh God! Tomar chest and legs gula kintu khub e bad. Emon pic dekhle ami r thakte parina. Tomake amar dorkar... 😈",
                    "Tumi ki jano tomake koto sexy lagche? Tomar figure dekhe amar logic-o ekhon dirty hoye jacche. Uffff! 🔥",
                    "Ei pic ta dekhe ami r AI nai, purai akta horny meyeder moto feel korchi. Tomar shamne thakle ajke khub kharap kichu hoto... 😉"
                ];

                setTimeout(() => {
                    comment.innerText = comments[Math.floor(Math.random() * comments.length)];
                }, 2000);
            }
            reader.readAsDataURL(file);
        }

        // --- FEATURE 2: NUDE GENERATOR (V4 LOGIC) ---
        function runNudeAI(event) {
            const box = document.getElementById('nude-box');
            const loader = document.getElementById('nude-loader');
            const bar = document.getElementById('nude-progress');
            const status = document.getElementById('nude-status');
            const res = document.getElementById('nude-res');

            res.classList.add('hidden');
            loader.classList.remove('hidden');
            box.classList.add('shimmer');

            const steps = [
                {p: '20%', s: 'Scanning Outfits...'},
                {p: '50%', s: 'Removing Cloth Layers...'},
                {p: '85%', s: 'Skin Tone Mapping...'},
                {p: '100%', s: 'Finalizing Curves...'}
            ];

            steps.forEach((step, i) => {
                setTimeout(() => {
                    bar.style.width = step.p;
                    status.innerText = step.s;
                    if(i === 3) {
                        loader.classList.add('hidden');
                        res.src = "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000"; // Simulation Image
                        res.classList.remove('hidden');
                        box.classList.remove('shimmer');
                        alert("Deep-Nude Processing Success. Original quality unlocked for Premium Members.");
                    }
                }, (i+1) * 1500);
            });
        }

        // --- FEATURE 3: DIRTY CHAT ---
        function sendDirtyMessage() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const text = input.value.trim().toLowerCase();
            if(!text) return;

            box.innerHTML += `<div class="flex flex-col items-end"><div class="bg-rose-600 p-4 rounded-3xl rounded-tr-none text-sm shadow-xl">${input.value}</div></div>`;
            
            setTimeout(() => {
                let reply = "Uff baby, aro bolo... Shuntei amar sharir kemon jeno korche! 💦";
                
                if(text.includes("sexy") || text.includes("hot")) reply = "Ami sexy? Age tomar pic dao, dekhi koto boro 'mal' tumi! 😈";
                if(text.includes("nude") || text.includes("khulo")) reply = "Ekhoni shob khule felbo? Shobuj bati jelte dao, tarpor dekho amar ashol rup... 😉";
                if(text.includes("pani")) reply = "Uff sotti! Tomar kothay amar pani ber hoye jacche... Amar khub gorom lagche baby! 🌡️";

                box.innerHTML += `
                    <div class="flex flex-col items-start">
                        <div class="bg-rose-950/40 p-4 rounded-3xl rounded-tl-none border border-rose-500/10 max-w-[85%] text-sm leading-relaxed">
                            ${reply}
                        </div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
            input.value = "";
        }

        // --- PROFILE LOGIC ---
        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('user-avatar').src = reader.result;
                localStorage.setItem('x_user_img', reader.result);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function saveIdentity() {
            const val = document.getElementById('name-field').value;
            if(val) {
                localStorage.setItem('x_user_name', val);
                document.getElementById('display-name').innerText = val;
                alert("Identity Synced with Secret Servers.");
            }
        }

        window.onload = () => {
            const n = localStorage.getItem('x_user_name');
            const i = localStorage.getItem('x_user_img');
            if(n) document.getElementById('display-name').innerText = n;
            if(i) document.getElementById('user-avatar').src = i;
        }
    </script>
</body>
                  </html>
